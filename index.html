<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="icon.png">
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        main {
            width: min(100%, 1100px);
            margin: 0 auto;
            padding: 0 1rem 2rem;
        }

        .header-bar {
            background: #2c68c4;
            padding: 4rem 0;
            width: 100vw;
            position: relative;
            left: 50%;
            right: 50%;
            margin-left: -50vw;
            margin-right: -50vw;
            text-align: center;
            box-sizing: border-box;
        }

        .header-bar nav {
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        .github-link {
            position: absolute;
            top: 50%;
            left: 2.7rem;
            transform: translateY(-50%);
            color: #fff;
            opacity: 0.85;
            transition: opacity 0.2s, transform 0.2s;
            line-height: 0;
        }

        .github-link:hover {
            opacity: 1;
            transform: translateY(-50%) scale(1.15);
        }

        .github-link svg {
            width: 56px;
            height: 56px;
            fill: currentColor;
        }

        .nav-btn {
            background: #111111;
            color: #ffffff;
            border: none;
            padding: 0.75rem 2rem;
            font-size: 1.1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            font-weight: bold;
        }

        .nav-btn.active {
            background: rgb(255, 255, 255);
            color: #111111;
        }

        .projects-section,
        .links-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 3rem;
        }

        .content-stack {
            margin-top: 1rem;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dropdown-group {
            margin-bottom: 1rem;
        }

        .project-card,
        .links-card {
            background: #222;
            color: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            width: min(100%, 540px);
            max-width: 100%;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            align-items: stretch;
        }

        .dropdown-group .dropdown-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.1rem;
            font-family: sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: bold;
            padding-top: 0.15rem;
            margin-left: 0;
            height: auto;
        }

        .dropdown-group .arrow {
            font-size: 1.2rem;
            transition: transform 0.2s;
            line-height: 1;
            vertical-align: middle;
            display: inline-block;
        }

        .dropdown-content {
            background: #ffffff;
            border-radius: 8px;
            border: 1.5px solid #000000;
            padding: 1rem 1.2rem;
            color: #ffffff;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.18);
            display: none;
            z-index: 10;
            margin-top: 1.3rem;
        }

        .dropdown-row {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
        }

        .photo-placeholder {
            width: 60px;
            height: 60px;
            background: #dadada;
            border: 3px solid #333;
            border-radius: 8px;
            margin-right: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-size: 2rem;
        }

        .dropdown-row:first-child .photo-placeholder {
            margin-top: 1.7rem;
        }

        .dropdown-text {
            color: #141414;
            font-family: sans-serif;
            font-size: 1rem;
        }

        .project-header {
            display: flex;
            align-items: center;
            gap: 0.7rem;
        }

        .project-title {
            font-size: 1.2rem;
            font-weight: bold;
            font-family: sans-serif;
            letter-spacing: 1px;
        }

        .links-card h2,
        .links-card ul {
            font-family: sans-serif;
        }

        .links-card h2 {
            color: #ffffff;
            margin-top: 0;
        }

        .links-card ul {
            color: #eee;
            padding-left: 1.25rem;
        }

        .links-card a {
            color: #4af;
        }

        @media (max-width: 900px) {
            .header-bar {
                padding: 1.5rem 1rem;
            }

            .header-bar nav {
                gap: 0.75rem;
                flex-wrap: wrap;
            }

            .nav-btn {
                padding: 0.65rem 1.1rem;
                font-size: 1rem;
            }

            .dropdown-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.6rem;
            }

            .photo-placeholder {
                margin-right: 0;
                margin-bottom: 0.35rem;
            }
        }

        @media (max-width: 600px) {

            .about-section,
            .projects-section,
            .links-section {
                margin-top: 1.25rem;
            }

            .project-card,
            .links-card {
                width: 100%;
                padding: 1rem;
            }

            .project-title,
            .dropdown-group .dropdown-btn,
            .dropdown-text {
                font-size: 1rem;
            }

            .header-bar nav {
                flex-direction: column;
                align-items: stretch;
                width: min(100%, 380px);
                margin: 0 auto;
            }

            .nav-btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <header class="header-bar">
        <a class="github-link" href="https://github.com/VIXXIEXOXO" target="_blank" rel="noopener noreferrer" aria-label="GitHub profile">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
            </svg>
        </a>
        <nav>
            <button class="nav-btn" id="about-tab">About</button>
            <button class="nav-btn" id="projects-tab">Projects</button>
            <button class="nav-btn" id="links-tab">Links</button>
        </nav>
    </header>

    <main>
        <section id="about" class="about-section" style="display: flex;"></section>

        <section id="projects" class="projects-section" style="display: none;"></section>

        <section id="links" class="links-section" style="display: none;"></section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const dropdownBtns = document.querySelectorAll('.dropdown-group .dropdown-btn');
            dropdownBtns.forEach(function (btn) {
                const group = btn.closest('.dropdown-group');
                const content = group ? group.querySelector('.dropdown-content') : null;
                const arrow = btn.querySelector('.arrow');
                if (!content || !arrow) return;

                btn.addEventListener('click', function () {
                    const isOpen = content.style.display === 'block';
                    content.style.display = isOpen ? 'none' : 'block';
                    arrow.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(90deg)';
                    btn.setAttribute('aria-expanded', isOpen ? 'false' : 'true');
                });
            });

            const aboutSection = document.getElementById('about');
            const projectsSection = document.getElementById('projects');
            const linksSection = document.getElementById('links');
            const aboutTab = document.getElementById('about-tab');
            const projectsTab = document.getElementById('projects-tab');
            const linksTab = document.getElementById('links-tab');

            function setActiveTab(tab) {
                [aboutTab, projectsTab, linksTab].forEach(function (button) {
                    button.classList.remove('active');
                });
                tab.classList.add('active');
            }

            aboutTab.addEventListener('click', function () {
                aboutSection.style.display = 'flex';
                projectsSection.style.display = 'none';
                linksSection.style.display = 'none';
                setActiveTab(aboutTab);
            });

            projectsTab.addEventListener('click', function () {
                aboutSection.style.display = 'none';
                projectsSection.style.display = 'flex';
                linksSection.style.display = 'none';
                setActiveTab(projectsTab);
            });

            linksTab.addEventListener('click', function () {
                aboutSection.style.display = 'none';
                projectsSection.style.display = 'none';
                linksSection.style.display = 'flex';
                setActiveTab(linksTab);
            });

            setActiveTab(aboutTab);
        });
    </script>
</body>

</html>
